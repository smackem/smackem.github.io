<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dozem - Heavy Metal</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header class="container text-center">
        <div id="logo-container">
            <img src="assets/dozem.png" alt="DOZEM Logo" id="logo" class="img-fluid">
        </div>
    </header>

    <main class="container">
        <!-- Milestone 2: Song list placeholder -->
        <ul class="song-list">
            <li class="song-item">
                <img src="https://placehold.co/90x90/111/eee?text=Song+1" alt="Song 1 Cover" class="song-image">
                <span class="song-title">Song Title One</span>
                <button class="btn btn-outline-light btn-sm">Play</button>
            </li>
            <li class="song-item">
                <img src="https://placehold.co/90x90/111/eee?text=Song+2" alt="Song 2 Cover" class="song-image">
                <span class="song-title">Song Title Two</span>
                <button class="btn btn-outline-light btn-sm">Play</button>
            </li>
            <li class="song-item">
                <img src="https://placehold.co/90x90/111/eee?text=Song+3" alt="Song 3 Cover" class="song-image">
                <span class="song-title">Song Title Three</span>
                <button class="btn btn-outline-light btn-sm">Play</button>
            </li>
        </ul>
    </main>

    <footer class="container py-2">
        <div class="footer-player d-flex justify-content-center align-items-center gap-4 mb-2">
            <div id="current-song-info" class="text-light small">Player idle</div>
            <div class="d-flex align-items-center gap-2">
                <span class="volume-icon">&#128266;</span> <!-- Loudspeaker icon -->
                <input type="range" id="footer-volume" class="form-range" style="width: 150px;" min="0" max="1" step="0.01" value="0.8">
            </div>
        </div>
        <div class="text-center pt-2">
            <a href="pages/about.html">About Dozem</a>
            <p class="mt-3"><small>Copyright &copy; Dozem 2026</small></p>
        </div>
    </footer>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- Custom Scripts -->
    <script src="scripts/index.js"></script>
</body>
</html>
